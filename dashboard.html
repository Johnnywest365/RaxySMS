<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RaxySMS Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<div class="dashboard">

    <!-- Header -->
    <header class="header">

        <div>
            <h1>RaxySMS</h1>
            <p>Buy your verification number cheap price</p>
        </div>

    </header>

    <!-- Welcome Card -->

    <section class="welcome-card">

        <div>

            <h2>
                Welcome back,
                <span id="userName">Loading...</span>
            </h2>

        </div>

        <div class="profile">

            <img
                src="https://ui-avatars.com/api/?name=User&background=2563EB&color=fff"
                id="profileImage"
                alt="Profile">

        </div>

    </section>

    <!-- Wallet -->

    <section class="wallet-card">

        <div class="wallet-balance">

            <h3>Wallet Balance</h3>

            <h1 id="walletBalance">
                ₦0.00
            </h1>

        </div>

        <div class="wallet-buttons">

            <button id="addFundsBtn">
                ➕ Add Funds
            </button>

            <button id="historyBtn">
                📜 History
            </button>

            <button id="supportBtn">
                💬 Support
            </button>

        </div>

    </section>

    <!-- Buy Numbers -->

    <section class="buy-section">

        <button id="usaBtn" class="buy-card">

            🇺🇸 Buy USA Number

        </button>

        <button id="countriesBtn" class="buy-card">

            🌍 Buy All Countries Number

        </button>

    </section>

    <!-- Recent Activations -->

    <section class="activation-card">

        <div class="card-header">

            <h2>⭐ Recent Activations</h2>

            <button id="refreshBtn">

                🔄 Refresh

            </button>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>

                    <th>Service</th>

                    <th>Number</th>

                    <th>SMS Code</th>

                    <th>Price</th>

                    <th>Status</th>

                    <th>Date</th>

                </tr>

                </thead>

                <tbody id="activationTable">

                </tbody>

            </table>

        </div>

    </section>

</div>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

<button id="accountsBtn">
🛒
<span>Accounts</span>
</button>

<button id="historyBottomBtn">
📜
<span>History</span>
</button>

<button id="homeBtn" class="active">
🏠
<span>Home</span>
</button>

<button id="apiBtn">
🔑
<span>API</span>
</button>

<button id="logoutBtn">
🚪
<span>Logout</span>
</button>

</nav>

<script type="module" src="dashboard.js"></script>

</body>
</html>
